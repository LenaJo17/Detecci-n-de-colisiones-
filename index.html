<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Glassmorphism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <div class="bg"></div>

    <nav class="navbar glass">
      <div class="container">
        <span class="navbar-brand">SYSTEM_OS // JOLETTE</span>
      </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="glass-box text-center">
            <h3>Simulación de Colisiones</h3>
            <canvas id="canvas" width="600" height="400"></canvas>
            <p class="status mt-4">> STATUS: RUNNING... | CORE_TEMP: NORMAL</p>
        </div>
    </main>

    <footer class="glass text-center p-2">
        Jolette Ochoa - Ingeniería en Sistemas &copy; 2026
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        window.onload = () => initBounce(25, "canvas");
    </script>
</body>
</html>
